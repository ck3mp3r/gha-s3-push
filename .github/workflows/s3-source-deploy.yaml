jobs:
  push-to-s3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: cd ../ && ls -lah
      - uses: ./.github/actions/s3push
        with:
          key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
